<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive - MR Newsletter</title>
  <meta name="description" content="MR Newsletter 지난 뉴스레터 아카이브. 과거 좌담회, 설문조사 모집 정보를 확인하세요.">
  <link rel="stylesheet" href="style.css">
  <script>
    (function() {
      var t = localStorage.getItem('mr_theme');
      if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="header__logo"><span>MR</span> Newsletter</a>
      <nav class="header__nav">
        <a href="index.html" class="header__link">Home</a>
        <a href="archive.html" class="header__link">Archive</a>
        <div class="theme-toggle" id="theme-toggle" title="Toggle theme" role="button" tabindex="0">
          <div class="theme-toggle__icons">
            <span>&#9728;&#65039;</span>
            <span>&#127769;</span>
          </div>
          <div class="theme-toggle__thumb"></div>
        </div>
        <a href="subscribe.html" class="header__cta">Subscribe</a>
      </nav>
    </div>
  </header>

  <!-- Archive Page -->
  <section class="hero" style="padding-bottom: 1rem;">
    <div class="container">
      <h1 class="hero__title">Newsletter Archive</h1>
      <p class="hero__subtitle">지난 뉴스레터를 확인하세요</p>
    </div>
  </section>

  <main class="container" style="margin-bottom: 3rem;">
    <ul class="archive-list" id="archive-list">
      <!-- Archive items will be generated by newsletter_builder.py -->
      <li class="archive-item" id="archive-today">
        <span class="archive-item__date" id="archive-today-date">Today</span>
        <a href="index.html" class="archive-item__title">Today's Newsletter</a>
      </li>
    </ul>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p class="footer__text">&copy; 2026 MR Newsletter. All rights reserved.</p>
      <div class="footer__links">
        <a href="index.html" class="footer__link">Home</a>
        <a href="subscribe.html" class="footer__link">Subscribe</a>
      </div>
    </div>
  </footer>

  <script>
    // Set today's date
    const dateEl = document.getElementById('archive-today-date');
    if (dateEl) {
      const now = new Date();
      dateEl.textContent = now.toISOString().slice(0, 10);
    }
  </script>
</body>
</html>
